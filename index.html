<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Venturez | Digital Operations Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .italic-black { font-style: italic; font-weight: 900; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(8px); }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('portal');
            const [activeTab, setActiveTab] = useState('ledger');
            const [searchQuery, setSearchQuery] = useState('');

            const employeeData = [
                {
                    id: "WV-2026-0391",
                    name: "Paul Monroe",
                    role: "Technical Lead",
                    project: {
                        title: "Web design, audit & 24/7 agent installment",
                        client: "Bob Lange",
                        category: "Enterprise",
                        completedDate: "March 24, 2026"
                    },
                    status: "Disbursement Scheduled",
                    amount: 536.81,
                    netPayout: 536.81,
                    method: "Cash App",
                    history: [
                        { label: "Submitted", date: "Mar 24", time: "03:15 PM" },
                        { label: "Audit Clear", date: "Mar 24", time: "05:00 PM" },
                        { label: "Scheduled", date: "Mar 26", time: "12:00 PM" }
                    ]
                }
            ];

            const metrics = [
                { label: 'Active Projects', value: '12', icon: 'layers', color: 'text-blue-600' },
                { label: 'Pending Payouts', value: '$4,290.15', icon: 'clock', color: 'text-amber-600' },
                { label: 'System Uptime', value: '99.9%', icon: 'activity', color: 'text-emerald-600' }
            ];

            const Icon = ({ name, className }) => {
                useEffect(() => { lucide.createIcons(); }, []);
                return <i data-lucide={name} className={className}></i>;
            };

            const Navbar = () => (
                <nav className="fixed w-full z-50 bg-slate-950 border-b border-white/5 h-14 flex items-center">
                    <div className="max-w-6xl mx-auto w-full px-4 flex items-center justify-between">
                        <div className="flex items-center space-x-2 cursor-pointer" onClick={() => setView('landing')}>
                            <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                                <Icon name="zap" className="text-white w-5 h-5 fill-white" />
                            </div>
                            <span className="text-sm italic-black text-white uppercase tracking-tighter">WEB VENTUREZ</span>
                        </div>
                        
                        <div className="hidden md:flex items-center space-x-8">
                            {['Ledger', 'Intelligence', 'Network'].map((tab) => (
                                <button 
                                    key={tab}
                                    onClick={() => setActiveTab(tab.toLowerCase())}
                                    className={`text-[10px] uppercase font-black tracking-widest transition-colors ${activeTab === tab.toLowerCase() ? 'text-blue-500' : 'text-slate-400 hover:text-white'}`}
                                >
                                    {tab}
                                </button>
                            ))}
                        </div>

                        <button 
                            onClick={() => setView(view === 'landing' ? 'portal' : 'landing')}
                            className="bg-white/10 text-white px-4 py-1.5 rounded-full font-bold text-[10px] hover:bg-white/20 transition-all border border-white/10 uppercase tracking-widest"
                        >
                            {view === 'landing' ? 'LOGIN' : 'LOGOUT'}
                        </button>
                    </div>
                </nav>
            );

            const EmployeePortal = () => (
                <div className="pt-14 pb-10 min-h-screen">
                    {/* Header Strip */}
                    <div className="bg-white border-b border-slate-200 py-3 px-4 shadow-sm sticky top-14 z-40">
                        <div className="max-w-6xl mx-auto flex flex-wrap items-center justify-between gap-4">
                            <div className="flex items-center space-x-3">
                                <div className="p-1.5 bg-slate-100 rounded-lg">
                                    <Icon name="layout-grid" className="text-slate-900 w-4 h-4" />
                                </div>
                                <h1 className="text-xs font-black text-slate-900 uppercase tracking-widest italic">Operations Console</h1>
                            </div>
                            
                            <div className="flex items-center space-x-4">
                                <div className="relative">
                                    <Icon name="search" className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-3.5 h-3.5" />
                                    <input 
                                        type="text"
                                        placeholder="Filter results..."
                                        className="pl-9 pr-4 py-1.5 bg-slate-50 border border-slate-200 rounded-full text-[10px] font-bold w-32 focus:w-48 transition-all focus:outline-none"
                                        value={searchQuery}
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                    />
                                </div>
                                <div className="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center border border-slate-200">
                                    <Icon name="bell" className="w-3.5 h-3.5 text-slate-600" />
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="max-w-6xl mx-auto px-4 mt-6">
                        {/* Metrics Row */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                            {metrics.map((m, i) => (
                                <div key={i} className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex items-center justify-between animate-fade-in" style={{animationDelay: `${i*0.1}s`}}>
                                    <div>
                                        <p className="text-[9px] font-black text-slate-400 uppercase mb-1">{m.label}</p>
                                        <p className="text-xl font-black text-slate-900 tracking-tighter">{m.value}</p>
                                    </div>
                                    <div className={`p-2 bg-slate-50 rounded-lg border border-slate-100`}>
                                        <Icon name={m.icon} className={`w-4 h-4 ${m.color}`} />
                                    </div>
                                </div>
                            ))}
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                            {/* Main Feed */}
                            <div className="lg:col-span-8 space-y-6">
                                {employeeData.map((emp, i) => (
                                    <div key={i} className="bg-white rounded-2xl border border-slate-200 shadow-md overflow-hidden animate-fade-in">
                                        <div className="p-5">
                                            <div className="flex flex-col md:flex-row justify-between gap-6">
                                                <div className="flex-1">
                                                    <div className="flex items-center space-x-2 mb-3">
                                                        <span className="px-2 py-0.5 bg-amber-50 text-amber-600 text-[9px] font-black uppercase rounded border border-amber-100 flex items-center gap-1">
                                                            <Icon name="circle" className="w-1.5 h-1.5 fill-amber-600" /> Queued
                                                        </span>
                                                        <span className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">{emp.id}</span>
                                                    </div>
                                                    <h2 className="text-lg italic-black text-slate-900 mb-4 leading-tight uppercase">{emp.project.title}</h2>
                                                    
                                                    <div className="grid grid-cols-2 gap-4 border-t border-slate-50 pt-4">
                                                        <div>
                                                            <p className="text-[8px] font-bold text-slate-400 uppercase">Primary Lead</p>
                                                            <p className="text-xs font-black text-slate-900">{emp.name}</p>
                                                        </div>
                                                        <div>
                                                            <p className="text-[8px] font-bold text-slate-400 uppercase">Contract Partner</p>
                                                            <p className="text-xs font-black text-slate-900">{emp.project.client}</p>
                                                        </div>
                                                    </div>
                                                </div>

                                                <div className="bg-slate-950 rounded-xl p-5 text-white md:w-64 shadow-xl border border-white/5 flex flex-col justify-between">
                                                    <div className="flex justify-between items-start mb-4">
                                                        <div>
                                                            <p className="text-[8px] font-black text-blue-400 uppercase tracking-widest">Payout Net</p>
                                                            <h3 className="text-2xl font-black tracking-tighter">${emp.amount.toFixed(2)}</h3>
                                                        </div>
                                                        <div className="bg-amber-500/10 px-2 py-1 rounded border border-amber-500/20 flex items-center space-x-1">
                                                            <Icon name="calendar-clock" className="w-2.5 h-2.5 text-amber-400" />
                                                            <span className="text-[9px] font-black text-amber-400 uppercase">SCHEDULED</span>
                                                        </div>
                                                    </div>
                                                    <div className="space-y-1.5 text-[10px] font-bold border-t border-white/5 pt-3">
                                                        <div className="flex justify-between text-slate-500">
                                                            <span>Status</span>
                                                            <span className="text-white italic">Awaiting Release</span>
                                                        </div>
                                                        <div className="flex justify-between text-slate-500">
                                                            <span>ETA</span>
                                                            <span className="text-white">Mar 26 @ 12:00 PM</span>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="mt-5 pt-5 border-t border-slate-100">
                                                <div className="flex justify-between gap-2 overflow-x-auto pb-2 custom-scrollbar">
                                                    {emp.history.map((log, idx) => (
                                                        <div key={idx} className={`px-3 py-2 rounded-lg border flex-1 min-w-[120px] ${log.label === 'Scheduled' ? 'bg-amber-50/30 border-amber-100' : 'bg-slate-50 border-slate-100'}`}>
                                                            <p className={`text-[8px] font-black uppercase mb-0.5 ${log.label === 'Scheduled' ? 'text-amber-600' : 'text-slate-400'}`}>{log.label}</p>
                                                            <p className="text-[10px] font-bold text-slate-900">{log.date} · {log.time}</p>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}

                                {/* Actions */}
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-white p-4 rounded-xl border border-slate-200 flex items-center justify-between opacity-60">
                                        <div className="flex items-center space-x-3">
                                            <Icon name="file-check" className="w-4 h-4 text-slate-400" />
                                            <span className="text-[10px] font-black text-slate-400 uppercase tracking-tight">Export Statement</span>
                                        </div>
                                        <Icon name="lock" className="w-3 h-3 text-slate-300" />
                                    </div>
                                    <div className="bg-blue-600 p-4 rounded-xl flex items-center justify-between text-white group cursor-pointer hover:bg-blue-700 transition-colors shadow-lg shadow-blue-600/20">
                                        <span className="text-[10px] font-black uppercase">Initialize New Audit</span>
                                        <Icon name="arrow-right" className="w-3 h-3 group-hover:translate-x-1 transition-transform" />
                                    </div>
                                </div>
                            </div>

                            {/* Sidebar Intelligence */}
                            <div className="lg:col-span-4 space-y-6">
                                <div className="bg-white rounded-2xl border border-slate-200 p-5 shadow-sm animate-fade-in" style={{animationDelay: '0.2s'}}>
                                    <h3 className="text-[10px] font-black text-slate-900 uppercase tracking-[0.2em] mb-4 border-b border-slate-50 pb-2 italic">Venture Intelligence</h3>
                                    <div className="space-y-4">
                                        {[
                                            { title: 'Nexus Audit Passed', time: '2m ago', type: 'success' },
                                            { title: 'Global Settlement Mar 26', time: '1h ago', type: 'info' },
                                            { title: 'Cloud Infrastructure Update', time: '4h ago', type: 'alert' }
                                        ].map((n, i) => (
                                            <div key={i} className="flex space-x-3 group">
                                                <div className={`w-1 h-8 rounded-full ${n.type === 'success' ? 'bg-emerald-500' : n.type === 'alert' ? 'bg-amber-500' : 'bg-blue-500'}`}></div>
                                                <div>
                                                    <p className="text-[10px] font-black text-slate-900 group-hover:text-blue-600 transition-colors">{n.title}</p>
                                                    <p className="text-[9px] font-bold text-slate-400">{n.time}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="bg-slate-900 rounded-2xl p-5 text-white shadow-xl shadow-slate-950/20 animate-fade-in" style={{animationDelay: '0.3s'}}>
                                    <div className="flex items-center space-x-2 mb-4">
                                        <Icon name="shield-check" className="w-4 h-4 text-emerald-400" />
                                        <h3 className="text-[10px] font-black uppercase tracking-widest">Compliance Node</h3>
                                    </div>
                                    <p className="text-[10px] text-slate-400 font-medium mb-4 leading-relaxed">
                                        Node 0391-A is currently operating under Standard Enterprise Protocol. All transactions are logged and verifiable.
                                    </p>
                                    <div className="bg-white/5 rounded-lg p-3 border border-white/5">
                                        <div className="flex justify-between items-center text-[9px] font-black">
                                            <span className="text-slate-500 uppercase">Verification Hash</span>
                                            <span className="text-emerald-400">82X-011-P</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const LandingPage = () => (
                <div className="bg-slate-950 text-white min-h-screen flex items-center justify-center px-4 overflow-hidden relative">
                    <div className="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none">
                        <div className="absolute top-1/4 left-1/4 w-96 h-96 bg-blue-600 rounded-full blur-[120px]"></div>
                        <div className="absolute bottom-1/4 right-1/4 w-96 h-96 bg-indigo-600 rounded-full blur-[120px]"></div>
                    </div>
                    <div className="text-center max-w-2xl animate-fade-in relative z-10">
                        <div className="inline-block px-3 py-1 bg-white/5 border border-white/10 rounded-full mb-6">
                            <span className="text-[9px] font-black tracking-[0.3em] uppercase text-blue-400 italic">Global Operations Ready</span>
                        </div>
                        <h1 className="text-5xl md:text-6xl font-black mb-6 tracking-tighter leading-[0.9]">
                            THE FUTURE OF <span className="text-blue-500 italic">EXECUTION.</span>
                        </h1>
                        <p className="text-slate-400 text-base md:text-lg mb-8 font-medium max-w-lg mx-auto leading-relaxed">
                            Elite remote delivery for web infrastructure, design audit, and autonomous agent orchestration.
                        </p>
                        <div className="flex flex-col sm:flex-row items-center justify-center gap-4">
                            <button onClick={() => setView('portal')} className="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 transition-all px-10 py-4 rounded-xl font-black text-sm tracking-widest shadow-2xl shadow-blue-600/30">
                                ENTER PORTAL
                            </button>
                            <button className="w-full sm:w-auto bg-white/5 hover:bg-white/10 transition-all border border-white/10 px-10 py-4 rounded-xl font-black text-sm tracking-widest">
                                CAPABILITIES
                            </button>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen">
                    <Navbar />
                    {view === 'landing' ? <LandingPage /> : <EmployeePortal />}
                    <footer className="bg-slate-950 py-8 text-center border-t border-white/5">
                        <p className="text-[9px] font-black text-slate-500 uppercase tracking-[0.5em] mb-2 italic">Web Venturez Global Operations</p>
                        <p className="text-[8px] font-bold text-slate-700 uppercase tracking-widest">Distributed Ledger Node: SEC-0391-ALPHA-CONSOLIDATED</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
